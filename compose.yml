name: invoice-router

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: invoice_router
      POSTGRES_PASSWORD: invoice_router
      POSTGRES_DB: invoice_router
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoice_router -d invoice_router"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://invoice_router:invoice_router@postgres:5432/invoice_router
      ANALYSIS_DATABASE_URL: postgresql://invoice_router:invoice_router@postgres:5432/invoice_router
      REDIS_URL: redis://redis:6379/0
      DATASET_ROOT: /workspace/samples
      OUTPUT_DIR: /workspace/.local/output
      TEMP_DIR: /workspace/.local/temp
    volumes:
      - ./:/workspace
    working_dir: /workspace
    user: appuser
    command: ["--help"]

volumes:
  postgres_data:
