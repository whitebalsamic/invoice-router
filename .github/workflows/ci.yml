name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check . && ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Mypy
        run: mypy

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y libgl1
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: CLI smoke test
        run: invoice-router --version
      - name: Run unit tests
        run: pytest -m "not integration and not e2e"

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: invoice_router
          POSTGRES_PASSWORD: invoice_router
          POSTGRES_DB: invoice_router
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U invoice_router -d invoice_router"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://invoice_router:invoice_router@localhost:5432/invoice_router
      ANALYSIS_DATABASE_URL: postgresql://invoice_router:invoice_router@localhost:5432/invoice_router
      REDIS_URL: redis://localhost:6379/0
      INVOICE_INPUT_DIR: /tmp/invoices
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y libgl1
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Run integration tests
        run: pytest -m integration

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: invoice_router
          POSTGRES_PASSWORD: invoice_router
          POSTGRES_DB: invoice_router
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U invoice_router -d invoice_router"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://invoice_router:invoice_router@localhost:5432/invoice_router
      ANALYSIS_DATABASE_URL: postgresql://invoice_router:invoice_router@localhost:5432/invoice_router
      REDIS_URL: redis://localhost:6379/0
      INVOICE_INPUT_DIR: /tmp/invoices
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y libgl1 tesseract-ocr
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Run end-to-end tests
        run: pytest -m e2e

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install --upgrade pip && python -m pip install build
      - name: Build package
        run: python -m build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker image
        run: docker build .
